apiVersion: v1
kind: Namespace 
metadata:
  name: frontend-team
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: frontend-team
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image:  devrvk/frontend-react-vite:v4
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: frontend-team
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP